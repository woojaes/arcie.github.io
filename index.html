<!doctype html>
<html lang="ko">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>AREFISH</title>

<style>

:root{
--brand:#0047ff;
--text:#111;
--muted:#6b7280;
--radius:18px;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:-apple-system,BlinkMacSystemFont,Pretendard,system-ui;
background:white;
color:var(--text);
line-height:1.6;
}

.container{
width:min(1150px,92%);
margin:auto;
}

section{
padding:110px 0;
}

h1,h2{
letter-spacing:-0.5px;
}

a{text-decoration:none}


/* FLIP */

.flip-container{
perspective:1500px;
width:100%;
min-height:100dvh;
}

.flipper{
width:100%;
min-height:100dvh;
transform-style:preserve-3d;
transition:transform 1.1s cubic-bezier(.65,.05,.36,1);
position:relative;
}

.flip-container.flip .flipper{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
min-height:100dvh;
top:0;
left:0;
backface-visibility:hidden;
}

.back{
transform:rotateY(180deg);
background:white;
overflow-x:hidden;
}


/* HERO */

.hero{
min-height:100dvh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
position:relative;
overflow:hidden;
}

.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,.35),rgba(0,0,0,.75));
}

.hero-content{
position:relative;
z-index:2;
max-width:720px;
padding:20px;
}

.hero h1{
font-size:82px;
font-weight:800;
}

.hero p{
margin-top:20px;
font-size:18px;
}

.enter-btn{
display:inline-block;
margin-top:40px;
background:var(--brand);
padding:16px 36px;
border-radius:999px;
font-weight:700;
color:white;
cursor:pointer;
transition:.3s;
}

.enter-btn:hover{
transform:translateY(-3px);
box-shadow:0 12px 30px rgba(0,0,0,.35);
}


/* HEADER */

header{
position:sticky;
top:0;
background:white;
border-bottom:1px solid #eee;
z-index:30;
}

.header-inner{
display:flex;
align-items:center;
justify-content:space-between;
padding:22px 0;
}

.logo{
font-size:20px;
font-weight:800;
}

nav a{
margin-left:26px;
font-weight:600;
font-size:14px;
color:#333;
}


/* CORE VALUE */

.values{
position:relative;
width:520px;
height:520px;
margin:80px auto;
display:flex;
align-items:center;
justify-content:center;
}

.value{
position:absolute;
width:130px;
height:130px;
border-radius:50%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
font-weight:700;
text-align:center;
padding:10px;
transition:.35s;
}

.value span{
font-size:12px;
font-weight:400;
margin-top:6px;
}

.center{
background:#111;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.v1{background:#2563eb;top:0;left:50%;transform:translateX(-50%);}
.v2{background:#7c3aed;top:25%;right:0;}
.v3{background:#22c55e;bottom:25%;right:0;}
.v4{background:#f59e0b;bottom:0;left:50%;transform:translateX(-50%);}
.v5{background:#ef4444;bottom:25%;left:0;}
.v6{background:#06b6d4;top:25%;left:0;}

.value:hover{
transform:scale(1.08);
box-shadow:0 15px 35px rgba(0,0,0,.2);
}


/* ARTISTS */

.artist-slider{
overflow:hidden;
margin-top:70px;
}

.artist-track{
display:flex;
gap:35px;
animation:artistScroll 20s linear infinite;
}

.artist{
min-width:260px;
border-radius:var(--radius);
overflow:hidden;
border:1px solid #eee;
background:white;
}

.artist img{
width:100%;
height:280px;
object-fit:contain;
background:#fafafa;
}

.artist p{
padding:16px;
font-weight:700;
}

.artist span{
display:block;
font-size:13px;
color:var(--muted);
font-weight:400;
}

@keyframes artistScroll{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}


/* PARTNERS */

.partner-wrap{
overflow:hidden;
margin-top:70px;
}

.partner-track{
display:flex;
gap:70px;
align-items:center;
animation:scroll 18s linear infinite;
}

.partner-track img{
height:55px;
opacity:.85;
filter:grayscale(100%);
transition:.3s;
}

.partner-track img:hover{
filter:none;
opacity:1;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}


/* STORE */

.store{
background:#f7f9fc;
text-align:center;
}

.store-btn{
display:inline-block;
margin-top:30px;
background:var(--brand);
color:white;
padding:16px 36px;
border-radius:999px;
font-weight:700;
}


/* FOOTER */

footer{
background:#111;
color:#aaa;
text-align:center;
padding:60px 0;
font-size:14px;
}

footer p{
margin:6px 0;
}


/* MOBILE */

@media(max-width:900px){

.hero h1{
font-size:46px;
}

.hero p{
font-size:15px;
}

.values{
width:300px;
height:300px;
}

.value{
width:70px;
height:70px;
font-size:10px;
}

.value span{
display:none;
}

.flipper{
transform:none !important;
}

.flip-container.flip .flipper{
transform:none !important;
}

.front{
display:none;
}

.back{
transform:none;
position:relative;
}

}

</style>

</head>

<body>

<div class="flip-container" id="flipPage">
<div class="flipper">

<section class="front hero">

<video id="heroVideo" autoplay muted loop playsinline webkit-playsinline preload="auto">
<source src="images/video.mp4" type="video/mp4">
</video>

<div class="hero-content">

<h1>AREFISH</h1>

<p>
Art • Respect • Expression • Future • Inclusion • Story • Harmony
</p>

<div class="enter-btn" onclick="flipPage()">ENTER</div>

</div>
</section>

<div class="back">

<header>
<div class="container header-inner">
<div class="logo">AREFISH</div>

<nav>
<a href="#value">Value</a>
<a href="#artists">Artists</a>
<a href="#partners">Partners</a>
</nav>

</div>
</header>

<section id="value">
<div class="container">

<h2 style="text-align:center;">Core Value</h2>

<div class="values">

<div class="value center">AREFISH</div>

<div class="value v1">Art<span>예술로 재능 발견</span></div>
<div class="value v2">Respect<span>다름을 존중</span></div>
<div class="value v3">Expression<span>자기 표현</span></div>
<div class="value v4">Future<span>새로운 미래</span></div>
<div class="value v5">Inclusion<span>경계 없는 사회</span></div>
<div class="value v6">Story<span>아티스트 기록</span></div>

</div>

</div>
</section>

</div>
</div>
</div>

<script>

function flipPage(){
document.getElementById("flipPage").classList.add("flip");
}

document.addEventListener("DOMContentLoaded",function(){

const video=document.getElementById("heroVideo");

if(video){

video.muted=true;

let playPromise=video.play();

if(playPromise!==undefined){

playPromise.catch(()=>{
video.play();
});

}

}

});

</script>

</body>
</html>
