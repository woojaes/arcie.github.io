<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AREFISH</title>

<style>

a {
  text-decoration: none;
}

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* BODY */
html,body {
  height:100%;
  font-family:-apple-system,BlinkMacSystemFont,Pretendard,system-ui;
  background:#000;
  overflow:hidden;
}

/* BOOT SCREEN */
#boot {
  position:fixed;
  inset:0;
  background:#000;
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:14px;
  letter-spacing:2px;
  cursor:pointer;
}

/* WRAPPER */
.wrapper {
  height:100%;
  transition:transform .9s cubic-bezier(.77,0,.18,1);
}

/* SECTION */
section {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:80px 20px;
  position:relative;
  text-align:center;
  overflow-y:auto;
}

/* HEADER */
header {
  position:fixed;
  top:0;
  width:100%;
  padding:14px 5%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:100;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,0.05);
}

.logo {
  font-weight:900;
  font-size:22px;
}

nav a {
  margin-left:14px;
  font-size:12px;
  color:#555;
  cursor:pointer;
}

/* HERO */
#hero { color:#fff; }

.bg-video {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

#hero::after {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(rgba(0,0,0,0.3),rgba(0,0,0,0.6));
  z-index:0;
}

.hero {
  max-width:360px;
  animation:fadeUp 1s ease;
  z-index:1;
}

.hero h1 {
  font-size:28px;
  line-height:1.5;
  font-weight:700;
}

.hero h1 span {
  display:block;
  font-size:54px;
  font-weight:900;
  letter-spacing:2px;
  margin-top:10px;
  animation:scaleUp 1.2s ease;
}

.hero p {
  font-size:13px;
  margin-top:14px;
  color:#ddd;
}

/* VIDEO */
#video {
  flex-direction:column;
  background:radial-gradient(circle at 30% 20%, #1f4d5a, #071a20 70%);
}

.video-wrap {
  position:relative;
  width:100%;
  height:100%;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.video-wrap iframe {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border:0;
}

/* STORY */
#story {
  flex-direction:column;
  background:linear-gradient(135deg,#0b2c33,#071a20,#020c10);
}

.story-buttons {
  display:flex;
  gap:8px;
  margin-bottom:40px;
}

.story-buttons button {
  padding:10px 18px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:rgba(255,255,255,0.6);
  font-size:12px;
  cursor:pointer;
  border-radius:20px;
}

.story-buttons button.active {
  color:#fff;
  border-color:#fff;
  background:rgba(255,255,255,0.1);
}

.story-wrap {
  max-width:360px;
  width:100%;
  display:flex;
  flex-direction:column;
  gap:20px;
  align-items:center;
  color:#fff;
}

.story-wrap img {
  width:100%;
  border-radius:14px;
}

/* CHARACTER */
.character-slider {
  width:100%;
  overflow:hidden;
}

.character-track {
  display:flex;
  gap:14px;
}

.character-card {
  min-width:140px;
  background:rgba(255,255,255,0.08);
  border-radius:14px;
  padding:10px;
}

.character-card img {
  width:100%;
  border-radius:10px;
}

.character-name {
  font-size:12px;
  font-weight:700;
  margin-top:8px;
}

/* GOODS */
.slider {
  overflow:hidden;
  border-radius:14px;
  width:100%;
}

.slides {
  display:flex;
  transition:.5s;
}

.goods-item {
  min-width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.goods-item img {
  width:100%;
  border-radius:14px;
}

.goods-name {
  margin-top:10px;
  font-size:13px;
  font-weight:700;
  color:#fff;
}

/* CONTACT */
#contact { color:#fff; }

#contact::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('images/contact.jpeg') center/cover no-repeat;
  filter:blur(8px);
  transform:scale(1.1);
  z-index:-2;
}

#contact::after {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

.contact {
  max-width:420px;
  opacity:0;
  transform:translateY(40px);
  animation:contactShow 1.2s ease forwards;
}

.contact-title {
  font-size:46px;
  font-weight:900;
  letter-spacing:3px;
  margin-bottom:35px;
}

.contact p {
  font-size:15px;
  margin:6px 0;
  color:#ddd;
}

/* ANIMATION */
@keyframes fadeUp {
  from {opacity:0;transform:translateY(20px);}
  to {opacity:1;transform:translateY(0);}
}

@keyframes scaleUp {
  from {opacity:0;transform:scale(0.9);}
  to {opacity:1;transform:scale(1);}
}

@keyframes contactShow {
  to {opacity:1;transform:translateY(0);}
}

.hidden { display:none; }

</style>
</head>

<body>

<!-- BOOT -->
<div id="boot">CLICK TO ENTER</div>

<header>
  <div class="logo">AREFISH</div>
  <nav>
    <a onclick="goTo(0)">HOME</a>
    <a onclick="goTo(1)">VIDEO</a>
    <a onclick="goTo(2)">STORY</a>
    <a onclick="goTo(3)">CONTACT</a>
  </nav>
</header>

<div class="wrapper" id="wrapper">

<!-- HERO -->
<section id="hero">

<video
  id="heroVideo"
  class="bg-video"
  muted
  playsinline
  autoplay
  loop
  preload="auto"
  poster="images/contact.jpeg"
>
  <source src="images/storys.mp4" type="video/mp4">
</video>

  <div class="hero">
    <h1>
      발달장애 아티스트<br>
      통합예술 플랫폼
      <span>AREFISH</span>
    </h1>
    <p>Inclusive Art For All</p>
  </div>
</section>

<!-- VIDEO -->
<section id="video">
  <div class="video-wrap">
    <iframe
      src="https://www.youtube.com/embed/SP6CLVX21Iw?autoplay=1&mute=1&controls=0&loop=1&playlist=SP6CLVX21Iw&playsinline=1"

      allowfullscreen>
    </iframe>
  </div>
</section>

<!-- STORY -->
<section id="story">

  <div class="story-buttons">
    <button id="btnStory" class="active">STORY</button>
    <button id="btnCharacter">CHARACTER</button>
    <button id="btnGoods">GOODS</button>
  </div>

  <div id="storyContent" class="story-wrap">
    <img src="images/story.jpg">
    <p>우리는 예술의 경계를 다시 정의합니다</p>
  </div>

  <div id="characterContent" class="story-wrap hidden">
    <div class="character-slider">
      <div class="character-track" id="charTrack">
        <div class="character-card">
          <img src="images/chars1.jpg">
          <div class="character-name">써니</div>
        </div>
        <div class="character-card">
          <img src="images/chars2.jpg">
          <div class="character-name">트윙키</div>
        </div>
        <div class="character-card">
          <img src="images/chars3.jpg">
          <div class="character-name">재피</div>
        </div>
        <div class="character-card">
          <img src="images/chars4.jpg">
          <div class="character-name">레이니</div>
        </div>
      </div>
    </div>
  </div>

  <div id="goodsContent" class="story-wrap hidden">
    <div class="slider">
      <div class="slides" id="slides">
        <div class="goods-item">
          <img src="images/goods1.jpg">
          <div class="goods-name">아르피시 폰케이스</div>
        </div>
        <div class="goods-item">
          <img src="images/goods2.jpg">
          <div class="goods-name">아르피시 열쇠고리</div>
        </div>
        <div class="goods-item">
          <img src="images/goods3.jpg">
          <div class="goods-name">아르피시 레인보우 슬리퍼</div>
        </div>
      </div>
    </div>
  </div>

</section>

<!-- CONTACT -->
<section id="contact">
  <div class="contact">
    <div class="contact-title">CONTACT US</div>
    <p>상호명: (주)물고기엔터</p>
    <p>대표자: 채종성</p>
    <p>사업자 등록번호:<span> 426-86-03616</span></p>
    <p>이메일: mulgogienter@gmail.com</p>
  </div>
</section>

</div>

<script>

/* =========================
   NETFLIX AUTOPLAY FIXED ENGINE
========================= */

const boot = document.getElementById("boot");
const heroVideo = document.getElementById("heroVideo");

async function startPlayback() {
  try {
    heroVideo.muted = true;
    heroVideo.playsInline = true;

    heroVideo.load();        // 🔴 핵심
    heroVideo.currentTime = 0;

    await heroVideo.play();

  } catch (e) {
    console.log(e);
  }

  boot.style.display = "none";
}

boot.addEventListener("click", startPlayback);
boot.addEventListener("touchstart", startPlayback);

/* NAV */
let index = 0;
let lock = false;
const wrapper = document.getElementById("wrapper");

function goTo(i){
  if(lock) return;

  index = i;
  lock = true;

  wrapper.style.transform = `translateY(-${index * 100}vh)`;

  setTimeout(()=>lock=false,900);

  if(index === 0){
    heroVideo.load();
    heroVideo.currentTime = 0;
    heroVideo.play().catch(()=>{});
  }
}

window.addEventListener("wheel",(e)=>{
  if(lock) return;

  if(e.deltaY>0 && index<3) goTo(index+1);
  if(e.deltaY<0 && index>0) goTo(index-1);
});

/* TABS */
const btnStory = document.getElementById("btnStory");
const btnCharacter = document.getElementById("btnCharacter");
const btnGoods = document.getElementById("btnGoods");

const storyContent = document.getElementById("storyContent");
const characterContent = document.getElementById("characterContent");
const goodsContent = document.getElementById("goodsContent");

function resetTabs(){
  storyContent.classList.add("hidden");
  characterContent.classList.add("hidden");
  goodsContent.classList.add("hidden");

  btnStory.classList.remove("active");
  btnCharacter.classList.remove("active");
  btnGoods.classList.remove("active");
}

btnStory.onclick = () => { resetTabs(); storyContent.classList.remove("hidden"); btnStory.classList.add("active"); };
btnCharacter.onclick = () => { resetTabs(); characterContent.classList.remove("hidden"); btnCharacter.classList.add("active"); };
btnGoods.onclick = () => { resetTabs(); goodsContent.classList.remove("hidden"); btnGoods.classList.add("active"); };

/* LOOP */
const track = document.getElementById("charTrack");
let pos = 0;

setInterval(()=>{
  if(!track) return;
  pos += 0.4;
  track.style.transform = `translateX(-${pos}px)`;
  if(pos > track.scrollWidth/2) pos = 0;
},16);

const slides = document.getElementById("slides");
let s = 0;

setInterval(()=>{
  if(!slides) return;
  s++;
  if(s>=3) s=0;
  slides.style.transform = `translateX(-${s*100}%)`;
},2500);

window.goTo = goTo;

</script>

</body>
</html>
