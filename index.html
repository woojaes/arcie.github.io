<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AREFISH</title>

<style>

:root{
--text:#fff;
--muted:rgba(255,255,255,.6);
}

*{box-sizing:border-box}

body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,Pretendard,system-ui;
}

/* HEADER */

header{
position:fixed;
top:0;
width:100%;
z-index:100;
padding:26px 6%;
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent);
}

.logo{
font-weight:800;
letter-spacing:2px;
font-size:18px;
}

nav a{
margin-left:28px;
font-size:12px;
letter-spacing:2px;
color:var(--muted);
}

nav a:hover{
color:#fff;
}

/* SLIDER */

.slider{
height:100vh;
overflow:hidden;
position:relative;
}

.slides{
display:flex;
height:100%;
transition:transform 1s cubic-bezier(.77,0,.18,1);
}

.slide{
min-width:100%;
height:100vh;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

/* VIDEO FULLSCREEN */

.slide video,
.slide img{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

/* OVERLAY */

.overlay{
position:absolute;
inset:0;
background:
linear-gradient(to bottom,rgba(0,0,0,.2),rgba(0,0,0,.8)),
radial-gradient(circle at center,transparent 40%,rgba(0,0,0,.6));
}

/* CONTENT */

.content{
position:relative;
z-index:2;
text-align:center;
max-width:900px;
padding:0 20px;
}

.content h1{
font-size:72px;
margin:0;
font-weight:800;
letter-spacing:6px;
text-transform:uppercase;
}

.content p{
margin-top:20px;
font-size:14px;
letter-spacing:3px;
color:var(--muted);
}

/* SCROLL INDICATOR */

.scroll{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
font-size:11px;
letter-spacing:3px;
color:var(--muted);
}

.scroll::after{
content:"";
display:block;
width:1px;
height:40px;
background:var(--muted);
margin:10px auto 0;
animation:line 1.5s infinite;
}

@keyframes line{
0%{transform:scaleY(0)}
50%{transform:scaleY(1)}
100%{transform:scaleY(0)}
}

/* DOTS */

.dots{
position:absolute;
right:40px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:12px;
}

.dot{
width:6px;
height:6px;
border-radius:50%;
background:rgba(255,255,255,.3);
cursor:pointer;
transition:.3s;
}

.dot.active{
background:#fff;
transform:scale(1.8);
}

/* MOBILE */

@media(max-width:768px){

.content h1{
font-size:38px;
letter-spacing:3px;
}

nav{
display:none;
}

.dots{
right:15px;
}

}

</style>
</head>

<body>

<header>
<div class="logo">AREFISH</div>
<nav>
<a href="#">ABOUT</a>
<a href="#">PROJECT</a>
<a href="#">PRODUCT</a>
<a href="#">PARTNERS</a>
<a href="#">CONTACT</a>
</nav>
</header>

<div class="slider">

<div class="slides" id="slides">

<!-- SLIDE 1 -->
<div class="slide">
<video autoplay muted loop playsinline>
<source src="images/video1.mp4">
</video>
<div class="overlay"></div>
<div class="content">
<h1>AREFISH</h1>
<p>ART IS FUTRUE </p>
</div>
</div>

<!-- SLIDE 2 -->
<div class="slide">
<img src="images/slide2.jpg">
<div class="overlay"></div>
<div class="content">
<h1>PROJECT</h1>
<p>CONNECTING ART AND SOCIETY</p>
</div>
</div>

<!-- SLIDE 3 -->
<div class="slide">
<video autoplay muted loop playsinline>
<source src="images/video2.mp4">
</video>
<div class="overlay"></div>
<div class="content">
<h1>PRODUCT</h1>
<p>STAGE MEETS TECHNOLOGY</p>
</div>
</div>

<!-- SLIDE 4 -->
<div class="slide">
<img src="images/slide4.jpg">
<div class="overlay"></div>
<div class="content">
<h1>PARTNERS</h1>
<p>DISCOVER POTENTIAL</p>
</div>
</div>

<!-- SLIDE 5 -->
<div class="slide">
<img src="images/slide5.jpg">
<div class="overlay"></div>
<div class="content">
<h1>CONTACT US</h1>
<p>THE NEXT GENERATION</p>
</div>
</div>

</div>

<div class="dots" id="dots"></div>

<div class="scroll">SCROLL</div>

</div>

<script>

const slides=document.getElementById("slides");
const dotsContainer=document.getElementById("dots");

let index=0;
const total=5;

/* DOT 생성 */
for(let i=0;i<total;i++){
let d=document.createElement("div");
d.className="dot";
d.onclick=()=>go(i);
dotsContainer.appendChild(d);
}

function update(){
document.querySelectorAll(".dot").forEach((d,i)=>{
d.classList.toggle("active",i===index);
});
}

function go(i){
index=i;
slides.style.transform=`translateX(-${i*100}%)`;
update();
}

/* AUTO SLIDE */
setInterval(()=>{
index=(index+1)%total;
go(index);
},5000);

update();

</script>

</body>
</html>
